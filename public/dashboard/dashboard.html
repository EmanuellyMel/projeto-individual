  window.onload = exibirPersonagemDoUsuario;
  function exibirPersonagemDoUsuario() {
    var personagem = JSON.parse(sessionStorage.PERSONAGEM || "[]");

    personagem.forEach((item) => {
      // document.getElementById("meuGRAFICO").innerHTML += `
      //         <button class="btn-chart" onclick="exibirPersonagem(${item.id})" id="meuGRAFICO${item.id}">${item.descricao}</button>
      //         `;
      document.getElementById("graficos").innerHTML += `
                  <div id="grafico${item.id}">
                      <h3 class="tituloGraficos">
                          <span id="tituloPersonagem${item.id}">${item.descricao}</span>
                      </h3>
                      <div class="graph" style="max-width: 500px; margin: auto; height: 400px; position: relative; ackground-color: aqua;">

                      </div>
                      <div class="label-captura">
                          <p id="avisoCaptura${item.id}" style="color: white"></p>
                      </div>
                  </div>
              `;
      console.log(sessionStorage.PERSONAGEM)

      obterDadosGrafico(item.id);
    });

    if (personagem.length > 0) {
      exibirPersonagem(personagem[0].id);
    }
  }


  function alterarTitulo(idPersonagem) {
    const titulo = document.getElementById(`tituloPersonagem${idPersonagem}`);
    if (titulo && sessionStorage.PERSONAGEM) {
      const personagem = JSON.parse(sessionStorage.PERSONAGEM)
        .find(p => p.id == idPersonagem);
      if (personagem) {
        titulo.innerHTML = personagem.descricao;
      }
    }
  }
  // O gráfico é construído com três funções:
  // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
  // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
  // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

  // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
  // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
  // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

  //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
  //     Para ajustar o "select", ajuste o comando sql em src/models
  function obterDadosGrafico(idPersonagem) {
    alterarTitulo(idPersonagem);

    if (proximaAtualizacao != undefined) {
      clearTimeout(proximaAtualizacao);
    }

    fetch(`/dash/dadosDash/`, { cache: "no-store" })
      .then(function (response) {
        if (response.ok) {
          response.json().then(function (resposta) {
            console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
            resposta.reverse();

            plotarGrafico(resposta, idPersonagem);
          });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
        }
      })
      .catch(function (error) {
        console.error(
          `Erro na obtenção dos dados p/ gráfico: ${error.message}`,
        );
      });
  }

  // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
  // Configura o gráfico (cores, tipo, etc), materializa-o na página e,
  // A função *plotarGrafico* também invoca a função *atualizarGrafico*
  function plotarGrafico(resposta, idPersonagem) {
    console.log("iniciando plotagem do gráfico...");

    // Criando estrutura para plotar gráfico - labels
    let labels = [];
    // Criando estrutura para plotar gráfico - dados
    let dados = {
      labels: labels,
      datasets: [{
        label: 'Identificações',
        data: [10, 20, 30],
        backgroundColor: [
          'rgb(255, 99, 132)',
          'rgb(54, 162, 235)',
          'rgb(255, 205, 86)'
        ],
        hoverOffset: 4
      }]
    };
    console.log("----------------------------------------------");
    console.log(
      'Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":',
    );
    console.log(resposta);

    // Inserindo valores recebidos em estrutura para plotar o gráfico
    for (i = 0; i < resposta.length; i++) {
      var registro = resposta[i];
      labels.push(registro.personagem);
      dados.datasets[0].data.push(registro.quantidade_identificacoes);
    }

    console.log("----------------------------------------------");
    console.log("O gráfico será plotado com os respectivos valores:");
    console.log("Labels:");
    console.log(labels);
    console.log("Dados:");
    console.log(dados.datasets);
    console.log("----------------------------------------------");

    // Criando estrutura para plotar gráfico - config
    const config = {
      type: "doughnut",
      data: dados,
      options: {
        responsive: true
      }
    };

    // Adicionando gráfico criado em div na tela
    let myChart = new Chart(
      document.getElementById(`myChartCanvas${idPersonagem}`),
      config,
    );

    setTimeout(() => atualizarGrafico(idPersonagem, dados, myChart), 2000);
  }

  // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
  // buscando a última medida inserida em tabela contendo as capturas,

  //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
  //     Para ajustar o "select", ajuste o comando sql em src/models
  function atualizarGrafico(idPersonagem, dados, myChart) {
    fetch(`/dash/dadosDash/`, { cache: "no-store" })
      .then(function (response) {
        if (response.ok) {
          response.json().then(function (novoRegistro) {
            obterDadosGrafico(idPersonagem);
            // alertar(novoRegistro, idPersonagem);
            console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
            console.log(`Dados atuais do gráfico:`);
            console.log(dados);

            let avisoCaptura = document.getElementById(
              `avisoCaptura${idPersonagem}`,
            );
            avisoCaptura.innerHTML = "";

            if (
              novoRegistro[0].personagem ==
              dados.labels[dados.labels.length - 1]
            ) {
              console.log(
                "---------------------------------------------------------------",
              );
              console.log(
                "Como não há dados novos para captura, o gráfico não atualizará.",
              );
              avisoCaptura.innerHTML =
                "<i class='fa-solid fa-triangle-exclamation'></i> Foi trazido o dado mais atual capturado pelo sensor. <br> Como não há dados novos a exibir, o gráfico não atualizará.";
              console.log("Horário do novo dado capturado:");
              console.log(novoRegistro[0].personagem);
              console.log("Horário do último dado capturado:");
              console.log(dados.labels[dados.labels.length - 1]);
              console.log(
                "---------------------------------------------------------------",
              );
            } else {
              // tirando e colocando valores no gráfico
              dados.labels.shift(); // apagar o primeiro
              dados.labels.push(novoRegistro.personagem); // incluir um novo momento

              dados.datasets[0].data.shift(); // apagar o primeiro de umidade
              dados.datasets[0].data.push(novoRegistro[0].quantidade_identificacoes);

              myChart.update();
            }

            // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
            proximaAtualizacao = setTimeout(
              () => atualizarGrafico(idPersonagem, dados, myChart),
              2000,
            );
          });
        } else {
          console.error("Nenhum dado encontrado ou erro na API");
          // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
          proximaAtualizacao = setTimeout(
            () => atualizarGrafico(idPersonagem, dados, myChart),
            2000,
          );
        }
      })
      .catch(function (error) {
        console.error(
          `Erro na obtenção dos dados p/ gráfico: ${error.message}`,
        );
      });
  }
